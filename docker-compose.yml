services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tzs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tzs_password}
      POSTGRES_DB: ${POSTGRES_DB:-tzs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tzs} -d ${POSTGRES_DB:-tzs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override so the backend talks to the db service (not localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER:-tzs}:${POSTGRES_PASSWORD:-tzs_password}@db:5432/${POSTGRES_DB:-tzs}
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Public URL the browser uses to reach the backend API
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
